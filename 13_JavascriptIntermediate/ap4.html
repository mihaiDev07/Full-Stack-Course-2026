  <body>
    <h1>Fibonacci Sequence</h1>

    <script>
      function fibonacci(n) {
        const output = [];
        for (let i = 0; i < n; i++) {
          if (i === 0) {
            output.push(0);
          } else if (i === 1) {
            output.push(1);
          } else {
            output.push(output[output.length - 2] + output[output.length - 1]);
          }
        }
        return output;
      }

      console.log(fibonacci(15));
    </script>
  </body>
</html>
