  <body>
    <h1>Who's paying?</h1>

    <script>
      const persons = ["taica", "daria", "mariana"];

      function whosPaying(names) {
        randomPerson = Math.floor(Math.random() * names.length);

        return `${names[randomPerson]}  face cinste cu un kebab `;
      }

      console.log(whosPaying(persons));
    </script>
  </body>
