<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Dog Age</h1>

    <script>
      let dogAge = prompt("What is your dog age?");
      let humanAge = (dogAge - 2) * 4 + 21;

      alert(
        "If your dog is " +
          dogAge +
          " years old, then they are " +
          humanAge +
          " in human years.",
      );
    </script>
  </body>
</html>
