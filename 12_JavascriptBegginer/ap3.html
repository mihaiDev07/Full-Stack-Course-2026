  <body>
    <h1>Calculate BMI</h1>

    <script>
      function calculateBMI(weight, height) {
        let bmi = Math.round(weight / (height * height));
        return bmi;
      }

      console.log(calculateBMI(84, 1.78));
    </script>
  </body>
